[build]
  # Tell Netlify where the frontend code lives
  base = "frontend"
  
  # Tell Netlify where the BUILT files go (usually 'dist' for Vite or 'build' for React)
  publish = "dist"
  
  # The command to actually build your site
  command = "npm run build"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200